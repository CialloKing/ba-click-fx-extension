name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建并检查
        run: npm test

      - name: 生成商店提交包
        run: npm run package:all

      - name: 上传插件构建产物
        uses: actions/upload-artifact@v7
        with:
          name: ba-click-fx-extension
          path: |
            dist/
            dist-firefox/
            release/*.zip
            release/SHA256SUMS.txt
            store-assets/
          if-no-files-found: error
