name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建并检查
        run: npm test

      - name: 打包发布 zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd dist
          zip -r "../ba-click-fx-extension-${VERSION}.zip" .

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ba-click-fx-extension-*.zip
          generate_release_notes: true
