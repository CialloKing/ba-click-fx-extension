name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建并检查
        run: npm test

      - name: 打包发布 zip
        run: npm run package:all

      - name: 校验发布标签、版本与包哈希
        run: npm run check:release -- "$GITHUB_REF_NAME"

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ba-click-fx-extension-*.zip
            release/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
