<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title description">
  <title id="title">BA Click FX</title>
  <desc id="description">蓝色圆环、光点与三角碎片组成的鼠标特效图标</desc>
  <defs>
    <radialGradient id="background" cx="68%" cy="28%" r="84%">
      <stop offset="0" stop-color="#174d82"/>
      <stop offset="0.55" stop-color="#0b2748"/>
      <stop offset="1" stop-color="#071629"/>
    </radialGradient>
    <linearGradient id="ring" x1="18" y1="18" x2="105" y2="108">
      <stop offset="0" stop-color="#dffcff"/>
      <stop offset="0.35" stop-color="#76dcff"/>
      <stop offset="1" stop-color="#488fff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="30" fill="url(#background)"/>
  <circle cx="64" cy="65" r="37" fill="none" stroke="#43bfff" stroke-opacity="0.18" stroke-width="12" filter="url(#glow)"/>
  <path d="M35 91A39 39 0 0 1 34 40" fill="none" stroke="url(#ring)" stroke-linecap="round" stroke-width="7"/>
  <path d="M48 30A39 39 0 0 1 98 50" fill="none" stroke="url(#ring)" stroke-linecap="round" stroke-width="4"/>
  <path d="M101 64A39 39 0 0 1 67 104" fill="none" stroke="#96eaff" stroke-linecap="round" stroke-width="5"/>
  <circle cx="63" cy="65" r="8" fill="#eafcff" filter="url(#glow)"/>
  <path d="M94 21l9 17-19-2z" fill="#f4feff" filter="url(#glow)"/>
  <path d="M107 83l8 13-15-1z" fill="#72d9ff"/>
  <path d="M23 99l11 6-10 7z" fill="#9feaff"/>
</svg>
